name: 01 - 🎯 دانلود یوتیوب

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '🔗 لینک ویدیو ( چند لینک با فاصله )'
        required: true
        type: string
      download_subtitles:
        description: '📝 زیرنویس ( فارسی و انگلیسی )'
        required: false
        default: false
        type: boolean
      quality:
        description: '🎬 کیفیت و نوع'
        required: false
        default: 'best'
        type: choice
        options:
          - best
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - audio
      password:
        description: '🔒 رمز ( اختیاری برای محافظت )'
        required: false
        default: ''
        type: string

jobs:
  get-video:
    name: "📥 دانلود ویدیو"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Check URL provided
        run: |
          if [ -z "${{ github.event.inputs.video_urls }}" ]; then
            echo "❌ No video URL provided!"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for Large Files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "Git configured for large file handling"

      - name: Start WARP Container
        run: |
          echo "Starting Cloudflare WARP container..."
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          echo "Waiting for WARP to initialize (15 seconds)..."
          sleep 15
          echo "Checking WARP status..."
          for i in {1..5}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"
              echo "$RESULT"
              break
            else
              echo "Attempt $i/5 - WARP not ready yet, waiting..."
              sleep 5
            fi
          done
          FINAL=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
          if echo "$FINAL" | grep -qE "warp=(on|plus)"; then
            echo "WARP proxy is ready!"
          else
            echo "WARP might not be fully active, but continuing anyway..."
            echo "Response: $FINAL"
          fi

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip p7zip-full curl jq bc unzip
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          deno --version
          pip3 install --upgrade yt-dlp

      - name: Download YouTube Video(s)
        env:
          YT_URLS: ${{ github.event.inputs.video_urls }}
          YT_QUALITY: ${{ github.event.inputs.quality }}
          YT_PASSWORD: ${{ github.event.inputs.password }}
          REPO_OWNER_ENV: ${{ github.repository_owner }}
          REPO_NAME_ENV: ${{ github.event.repository.name }}
          BRANCH_ENV: ${{ github.ref_name }}
        run: |
          # ── SETUP ────────────────────────────────
          REPO_OWNER="${REPO_OWNER_ENV}"
          REPO_NAME="${REPO_NAME_ENV}"
          BRANCH="${BRANCH_ENV}"
          URLS_RAW="${YT_URLS}"
          read -ra URL_LIST <<< "$URLS_RAW"
          TOTAL_URLS=${#URL_LIST[@]}
          QUALITY="${YT_QUALITY}"
          ZIP_PASSWORD="${YT_PASSWORD}"
          DOWNLOAD_SUBS="${{ github.event.inputs.download_subtitles }}"
          SPLIT_MB=45
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))
          BACKUP_DIR="/tmp/video_backup_$$"
          mkdir -p "$BACKUP_DIR"
          mkdir -p videos
          > /tmp/video_info.txt

          echo "Total URLs to download: $TOTAL_URLS"
          echo "Quality: $QUALITY"

          # ── FUNCTIONS ────────────────────────────────
          sanitize_name() {
            echo "$1" | sed 's/ /-/g' | sed 's/　/-/g' | tr -s '-'
          }
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }
          case "$QUALITY" in
            "audio") FORMAT="bestaudio/bestaudio*/best";;
            "best") FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best";;
            "2160"|"4k") FORMAT="bestvideo[height<=2160]+bestaudio/bestvideo[height<=2160]*+bestaudio*/bestvideo+bestaudio/best";;
            "1440"|"2k") FORMAT="bestvideo[height<=1440]+bestaudio/bestvideo[height<=1440]*+bestaudio*/bestvideo+bestaudio/best";;
            "1080") FORMAT="bestvideo[height<=1080]+bestaudio/bestvideo[height<=1080]*+bestaudio*/bestvideo+bestaudio/best";;
            "720") FORMAT="bestvideo[height<=720]+bestaudio/bestvideo[height<=720]*+bestaudio*/bestvideo+bestaudio/best";;
            "480") FORMAT="bestvideo[height<=480]+bestaudio/bestvideo[height<=480]*+bestaudio*/bestvideo+bestaudio/best";;
            *) FORMAT="bestvideo+bestaudio/bestvideo*+bestaudio*/best";;
          esac
          download_video() {
            local METHOD=$1; local URL=$2; local TMP_DIR=$3;
            echo "Trying download method $METHOD..."
            if [ "$QUALITY" = "audio" ]; then
              COMMON_FLAGS="--extract-audio --audio-format mp3 --audio-quality 0 --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            elif [ "$QUALITY" = "best" ]; then
              COMMON_FLAGS="--merge-output-format mp4 --format-sort res,+codec:vp9.1,+size --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            else
              COMMON_FLAGS="--merge-output-format mp4 --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            fi
            case $METHOD in
              1) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" --add-header "Accept-Language:en-US,en;q=0.9" "$URL";;
              2) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:npm --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" --add-header "Accept-Language:en-US,en;q=0.9" "$URL";;
              3) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web,mweb,android_vr" --js-runtimes deno --remote-components ejs:github "$URL";;
              4) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=mweb" "$URL";;
              5) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=android_vr" "$URL";;
              6) yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno --remote-components ejs:github "$URL";;
              7) yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=mweb" "$URL";;
              8) yt-dlp --proxy "socks5://127.0.0.1:1080" --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=android" --user-agent "Mozilla/5.0 (Linux; Android 12; SM-S906N Build/QP1A.190711.020) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36" "$URL";;
            esac
          }
          RANDOM_WORDS=("alpha" "beta" "gamma" "delta" "epsilon" "zeta" "theta" "kappa" "lambda" "sigma" "omega" "nova" "star" "moon" "sun" "sky" "cloud" "river" "ocean" "mountain")
          get_random_word() { echo "${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}_$RANDOM"; }
          get_unique_folder() {
            local BASE_PATH="$1"; local NAME="$2";
            if [ ! -d "$BASE_PATH/$NAME" ] && [ ! -d "$BACKUP_DIR/$NAME" ]; then echo "$NAME"; return; fi
            local RANDOM_SUFFIX=$(get_random_word)
            while [ -d "$BASE_PATH/${NAME}_${RANDOM_SUFFIX}" ] || [ -d "$BACKUP_DIR/${NAME}_${RANDOM_SUFFIX}" ]; do RANDOM_SUFFIX=$(get_random_word); done
            echo "${NAME}_${RANDOM_SUFFIX}"
          }
          normalize_youtube_url() {
            local INPUT_URL="$1"
            if [[ "$INPUT_URL" =~ youtu\.be/([a-zA-Z0-9_-]+) ]]; then
              VIDEO_ID="${BASH_REMATCH[1]}"; VIDEO_ID="${VIDEO_ID%%\?*}";
              echo "https://www.youtube.com/watch?v=${VIDEO_ID}"
            else
              echo "$INPUT_URL"
            fi
          }

          # ── MAIN LOOP ────────────────────────────────
          URL_INDEX=0
          for URL in "${URL_LIST[@]}"; do
            URL_INDEX=$((URL_INDEX + 1))
            URL=$(normalize_youtube_url "$URL")
            echo "============================================================"
            echo "Processing URL $URL_INDEX / $TOTAL_URLS : $URL"
            echo "============================================================"
            TMP_DIR="tmp_downloads_${URL_INDEX}"
            mkdir -p "$TMP_DIR"
            DOWNLOAD_SUCCESS=false
            for METHOD in 1 2 3 4 5 6 7 8; do
              if download_video $METHOD "$URL" "$TMP_DIR"; then
                echo "Download successful with method $METHOD!"
                QUALITY_OK=true
                if [ "$QUALITY" != "best" ] && [ "$QUALITY" != "audio" ]; then
                  for DOWNLOADED_FILE in "$TMP_DIR"/*.mp4 "$TMP_DIR"/*.webm "$TMP_DIR"/*.mkv; do
                    [ -f "$DOWNLOADED_FILE" ] || continue
                    ACTUAL_HEIGHT=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of csv=p=0 "$DOWNLOADED_FILE" 2>/dev/null || echo "unknown")
                    if [ "$ACTUAL_HEIGHT" != "unknown" ] && [ "$ACTUAL_HEIGHT" -lt $(( QUALITY - 150 )) ] 2>/dev/null; then
                      echo "⚠️  Method $METHOD delivered ${ACTUAL_HEIGHT}p instead of ${QUALITY}p — rejecting..."
                      QUALITY_OK=false; rm -f "$DOWNLOADED_FILE";
                    fi
                  done
                fi
                if [ "$QUALITY_OK" = true ]; then DOWNLOAD_SUCCESS=true; break; fi
              else
                echo "Method $METHOD failed, waiting 3 seconds..."
                sleep 3
              fi
            done
            if [ "$DOWNLOAD_SUCCESS" = false ]; then
              echo "❌ All download methods failed for URL: $URL — skipping."; rm -rf "$TMP_DIR"; continue;
            fi
            find "$TMP_DIR" -name "*.part" -delete
            for FILE in "$TMP_DIR"/*; do
              [ -f "$FILE" ] || continue
              if [[ "$FILE" == *.jpg ]] || [[ "$FILE" == *.webp ]]; then continue; fi
              SIZE=$(stat -c%s "$FILE"); BASENAME=$(basename "$FILE"); FILENAME_NO_EXT="${BASENAME%.*}"; EXT="${BASENAME##*.}";
              FILENAME_NO_EXT=$(sanitize_name "$FILENAME_NO_EXT")
              FINAL_FOLDER_NAME=$(get_unique_folder "videos" "$FILENAME_NO_EXT")
              mkdir -p "$BACKUP_DIR/${FINAL_FOLDER_NAME}"
              THUMB_FILE=$(ls "$TMP_DIR"/*.jpg 2>/dev/null | head -1)
              if [ -n "$THUMB_FILE" ] && [ -f "$THUMB_FILE" ]; then cp "$THUMB_FILE" "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnail.jpg"; fi
              echo "${FILENAME_NO_EXT}|${FINAL_FOLDER_NAME}" >> /tmp/video_info.txt
              FOLDER_ENCODED=$(urlencode "${FINAL_FOLDER_NAME}")
              if [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
                ARCHIVE_BASE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}"
                if [ -n "$ZIP_PASSWORD" ]; then
                  7z a -tzip -v${SPLIT_MB}m -p"${ZIP_PASSWORD}" -mx=0 "${ARCHIVE_BASE}.zip" "$FILE"
                else
                  zip -0 -s ${SPLIT_MB}m "${ARCHIVE_BASE}.zip" "$FILE"
                fi
                PART_COUNT=$(ls "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.zip "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.z[0-9]* 2>/dev/null | wc -l)
                echo "Created $PART_COUNT parts"

                TOTAL_SIZE=0
                for part_file in "$BACKUP_DIR/${FINAL_FOLDER_NAME}"/*; do
                  if [ -f "$part_file" ]; then
                    PART_SIZE=$(stat -c%s "$part_file")
                    TOTAL_SIZE=$((TOTAL_SIZE + PART_SIZE))
                  fi
                done
                TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)

                DOWNLOAD_LINKS_MD=""
                LINK_NUM=0
                for part_file in $(ls "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.zip "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.z[0-9]* 2>/dev/null | sort -V); do
                  if [ -f "$part_file" ]; then
                    PART_BASENAME=$(basename "$part_file")
                    PART_ENCODED=$(urlencode "${PART_BASENAME}")
                    RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_ENCODED}/${PART_ENCODED}"
                    LINK_NUM=$((LINK_NUM + 1))
                    DOWNLOAD_LINKS_MD="${DOWNLOAD_LINKS_MD}| ${LINK_NUM} | \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |"$'\n'
                  fi
                done

                MAIN_ZIP="${FINAL_FOLDER_NAME}.zip"

                README_FILE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
                {
                  printf '%s\n' "# ${FILENAME_NO_EXT}"
                  printf '%s\n' ""

                  if [ -f "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnail.jpg" ]; then
                    THUMB_ENCODED=$(urlencode "thumbnail.jpg")
                    THUMB_RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_ENCODED}/${THUMB_ENCODED}"
                    printf '%s\n' "<div align=\"center\">"
                    printf '%s\n' "  <picture>"
                    printf '%s\n' "    <img src=\"thumbnail.jpg\" width=\"250\" />"
                    printf '%s\n' "  </picture>"
                    printf '%s\n' "</div>"
                    printf '%s\n' ""
                    printf '%s\n' "<br>"
                    printf '%s\n' ""
                  fi

                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Video Information"
                  printf '%s\n' ""
                  printf '%s\n' "| Property | Value |"
                  printf '%s\n' "|----------|-------|"
                  printf '%s\n' "| **Video Name** | \`${FILENAME_NO_EXT}\` |"
                  printf '%s\n' "| **Original Link** | [YouTube Video](${URL}) |"
                  printf '%s\n' "| **Total Size** | **${PART_COUNT} parts** - **${TOTAL_SIZE_MB} MB** |"
                  printf '%s\n' "| **Quality** | **${QUALITY}** |"
                  printf '%s\n' "| **Status** | **Complete (100%)** |"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    printf '%s\n' "| **Password Protected** | **YES** |"
                  else
                    printf '%s\n' "| **Password Protected** | **NO** |"
                  fi
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Links"
                  printf '%s\n' ""
                  printf '%s\n' "> ⬇️ Download **all parts**, then open \`${MAIN_ZIP}\` — the other parts are found automatically."
                  printf '%s\n' ""
                  printf '%s\n' "| # | File | Link |"
                  printf '%s\n' "|---|------|------|"
                  printf '%s' "${DOWNLOAD_LINKS_MD}"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## How to Extract"
                  printf '%s\n' ""
                  printf '%s\n' "Download all parts into the **same folder**, then:"
                  printf '%s\n' ""
                  if [ -n "$ZIP_PASSWORD" ]; then
                    printf '%s\n' "| OS | Steps |"
                    printf '%s\n' "|----|-------|"
                    printf '%s\n' "| **Windows** | Right-click \`${MAIN_ZIP}\` → *Extract Here* (needs [7-Zip](https://www.7-zip.org/) or WinRAR) → enter password |"
                    printf '%s\n' "| **Mac** | Open with [Keka](https://www.keka.io/) → enter password |"
                    printf '%s\n' "| **Linux** | \`unzip ${MAIN_ZIP}\` or right-click → Extract → enter password |"
                    printf '%s\n' "| **Android** | Use [ZArchiver](https://play.google.com/store/apps/details?id=ru.zdevs.zarchiver) → tap \`${MAIN_ZIP}\` → enter password |"
                  else
                    printf '%s\n' "| OS | Steps |"
                    printf '%s\n' "|----|-------|"
                    printf '%s\n' "| **Windows** | Double-click \`${MAIN_ZIP}\` — opens in Explorer, WinRAR, or 7-Zip automatically |"
                    printf '%s\n' "| **Mac** | Double-click \`${MAIN_ZIP}\` — extracts with Archive Utility or The Unarchiver |"
                    printf '%s\n' "| **Linux** | \`unzip ${MAIN_ZIP}\` or right-click → Extract Here (Ark/File Manager) |"
                    printf '%s\n' "| **Android** | Tap \`${MAIN_ZIP}\` in your file manager — or use [ZArchiver](https://play.google.com/store/apps/details?id=ru.zdevs.zarchiver) |"
                  fi
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                } > "$README_FILE"

                echo "Created README.md"

              else
                if [ -n "$ZIP_PASSWORD" ]; then
                  echo "$BASENAME - creating password-protected zip archive"

                  zip -0 -P "${ZIP_PASSWORD}" \
                    "$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}.zip" \
                    "$FILE"

                  SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                  FILE_ENCODED=$(urlencode "${FINAL_FOLDER_NAME}.zip")
                  RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_ENCODED}/${FILE_ENCODED}"

                  README_FILE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
                  {
                    printf '%s\n' "# ${FILENAME_NO_EXT}"
                    printf '%s\n' ""

                    if [ -f "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnail.jpg" ]; then
                      THUMB_ENCODED=$(urlencode "thumbnail.jpg")
                      THUMB_RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_ENCODED}/${THUMB_ENCODED}"
                      printf '%s\n' "<div align=\"center\">"
                      printf '%s\n' "  <picture>"
                      printf '%s\n' "    <img src=\"${THUMB_RAW_LINK}\" alt=\"Video Thumbnail\" width=\"250\" />"
                      printf '%s\n' "  </picture>"
                      printf '%s\n' "</div>"
                      printf '%s\n' ""
                      printf '%s\n' "<br>"
                      printf '%s\n' ""
                    fi

                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## Video Information"
                    printf '%s\n' ""
                    printf '%s\n' "| Property | Value |"
                    printf '%s\n' "|----------|-------|"
                    printf '%s\n' "| **Video Name** | \`${FILENAME_NO_EXT}\` |"
                    printf '%s\n' "| **Original Link** | [YouTube Video](${URL}) |"
                    printf '%s\n' "| **Total Size** | **1 archive** - **${SIZE_MB} MB** |"
                    printf '%s\n' "| **Quality** | **${QUALITY}** |"
                    printf '%s\n' "| **Status** | **Complete (100%)** |"
                    printf '%s\n' "| **Password Protected** | **YES** |"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## Download Link"
                    printf '%s\n' ""
                    printf '%s\n' "| # | File | Link |"
                    printf '%s\n' "|---|------|------|"
                    printf '%s\n' "| 1 | \`${FINAL_FOLDER_NAME}.zip\` | [Download](${RAW_LINK}) |"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## How to Extract"
                    printf '%s\n' ""
                    printf '%s\n' "| OS | Steps |"
                    printf '%s\n' "|----|-------|"
                    printf '%s\n' "| **Windows** | Double-click \`${FINAL_FOLDER_NAME}.zip\` → enter password |"
                    printf '%s\n' "| **Mac** | Double-click → enter password (or use [The Unarchiver](https://theunarchiver.com/)) |"
                    printf '%s\n' "| **Linux** | \`unzip ${FINAL_FOLDER_NAME}.zip\` → enter password |"
                    printf '%s\n' "| **Android** | Tap the file in your file manager → enter password |"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                  } > "$README_FILE"

                  echo "Created password-protected zip archive and README.md"

                else
                  echo "$BASENAME - copying directly (no archive needed)"

                  cp "$FILE" "$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}.${EXT}"

                  SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                  FILE_ENCODED=$(urlencode "${FINAL_FOLDER_NAME}.${EXT}")
                  RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_ENCODED}/${FILE_ENCODED}"

                  README_FILE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
                  {
                    printf '%s\n' "# ${FILENAME_NO_EXT}"
                    printf '%s\n' ""

                    if [ -f "$BACKUP_DIR/${FINAL_FOLDER_NAME}/thumbnail.jpg" ]; then
                      THUMB_ENCODED=$(urlencode "thumbnail.jpg")
                      THUMB_RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_ENCODED}/${THUMB_ENCODED}"
                      printf '%s\n' "<div align=\"center\">"
                      printf '%s\n' "  <picture>"
                      printf '%s\n' "    <img src=\"${THUMB_RAW_LINK}\" alt=\"Video Thumbnail\" width=\"250\" />"
                      printf '%s\n' "  </picture>"
                      printf '%s\n' "</div>"
                      printf '%s\n' ""
                      printf '%s\n' "<br>"
                      printf '%s\n' ""
                    fi

                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## Video Information"
                    printf '%s\n' ""
                    printf '%s\n' "| Property | Value |"
                    printf '%s\n' "|----------|-------|"
                    printf '%s\n' "| **Video Name** | \`${FILENAME_NO_EXT}\` |"
                    printf '%s\n' "| **Original Link** | [YouTube Video](${URL}) |"
                    printf '%s\n' "| **Total Size** | **1 file** (no split) - **${SIZE_MB} MB** |"
                    printf '%s\n' "| **Quality** | **${QUALITY}** |"
                    printf '%s\n' "| **Status** | **Complete (100%)** |"
                    printf '%s\n' "| **Password Protected** | **NO** |"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## Download Link"
                    printf '%s\n'
                                        printf '%s\n' "| # | File | Link |"
                    printf '%s\n' "|---|------|------|"
                    printf '%s\n' "| 1 | \`${FINAL_FOLDER_NAME}.${EXT}\` | [Download](${RAW_LINK}) |"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "## How to Play"
                    printf '%s\n' ""
                    printf '%s\n' "| OS | Player |"
                    printf '%s\n' "|----|--------|"
                    printf '%s\n' "| **Windows** | [VLC](https://www.videolan.org/) or Windows Media Player |"
                    printf '%s\n' "| **Mac** | [IINA](https://iina.io/) or QuickTime |"
                    printf '%s\n' "| **Linux** | VLC or MPV |"
                    printf '%s\n' "| **Android** | [VLC for Android](https://play.google.com/store/apps/details?id=org.videolan.vlc) |"
                    printf '%s\n' ""
                    printf '%s\n' "---"
                    printf '%s\n' ""
                    printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                  } > "$README_FILE"

                  echo "Created README.md"
                fi
              fi
            done

            rm -rf "$TMP_DIR"
          done

          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt
          echo "REPO_OWNER=$REPO_OWNER" > /tmp/env_vars.txt
          echo "REPO_NAME=$REPO_NAME" >> /tmp/env_vars.txt
          echo "BRANCH=$BRANCH" >> /tmp/env_vars.txt
          echo "All downloads complete!"

      - name: Download Subtitles
        if: ${{ github.event.inputs.download_subtitles == 'true' }}
        env:
          YT_URLS: ${{ github.event.inputs.video_urls }}
        run: |
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          source /tmp/env_vars.txt

          normalize_youtube_url() {
            local INPUT_URL="$1"
            if [[ "$INPUT_URL" =~ youtu\.be/([a-zA-Z0-9_-]+) ]]; then
              VIDEO_ID="${BASH_REMATCH[1]}"; VIDEO_ID="${VIDEO_ID%%\?*}";
              echo "https://www.youtube.com/watch?v=${VIDEO_ID}"
            else
              echo "$INPUT_URL"
            fi
          }

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          read -ra URL_LIST <<< "$YT_URLS"
          VIDEO_INFO_FILE="/tmp/video_info.txt"

          URL_INDEX=0
          while IFS='|' read -r ORIG_NAME FOLDER_NAME; do
            URL_INDEX=$((URL_INDEX + 1))
            URL="${URL_LIST[$((URL_INDEX - 1))]}"
            URL=$(normalize_youtube_url "$URL")
            echo "Downloading subtitles for: $ORIG_NAME"

            SUB_TMP="/tmp/subs_${URL_INDEX}"
            mkdir -p "$SUB_TMP"
            SUB_FOUND=false

            for METHOD in 1 2 3 4; do
              echo "Subtitle method $METHOD..."
              case $METHOD in
                1) yt-dlp --proxy "socks5://127.0.0.1:1080" \
                     --skip-download --write-subs --write-auto-subs \
                     --sub-langs "fa,en" --sub-format "vtt/srt/best" \
                     --convert-subs vtt \
                     --output "${SUB_TMP}/%(title)s.%(ext)s" \
                     --no-playlist "$URL" 2>/dev/null || true;;
                2) yt-dlp --proxy "socks5://127.0.0.1:1080" \
                     --skip-download --write-subs --write-auto-subs \
                     --sub-langs "fa.*,en.*" --sub-format "vtt/srt/best" \
                     --convert-subs vtt \
                     --output "${SUB_TMP}/%(title)s.%(ext)s" \
                     --extractor-args "youtube:player_client=mweb" \
                     --no-playlist "$URL" 2>/dev/null || true;;
                3) yt-dlp \
                     --skip-download --write-subs --write-auto-subs \
                     --sub-langs "fa,en" --sub-format "vtt/srt/best" \
                     --convert-subs vtt \
                     --output "${SUB_TMP}/%(title)s.%(ext)s" \
                     --no-playlist "$URL" 2>/dev/null || true;;
                4) yt-dlp --proxy "socks5://127.0.0.1:1080" \
                     --skip-download --write-subs --write-auto-subs \
                     --sub-langs "all" --sub-format "vtt/srt/best" \
                     --convert-subs vtt \
                     --output "${SUB_TMP}/%(title)s.%(ext)s" \
                     --no-playlist "$URL" 2>/dev/null || true;;
              esac

              SUB_COUNT=$(find "$SUB_TMP" -name "*.vtt" 2>/dev/null | wc -l)
              if [ "$SUB_COUNT" -gt 0 ]; then
                echo "Found $SUB_COUNT subtitle file(s) with method $METHOD"
                SUB_FOUND=true
                break
              fi
            done

            if [ "$SUB_FOUND" = true ]; then
              TARGET_DIR="$BACKUP_DIR/${FOLDER_NAME}"
              mkdir -p "$TARGET_DIR"
              zip -j "${TARGET_DIR}/subtitle.zip" "$SUB_TMP"/*.vtt
              echo "Created subtitle.zip in $TARGET_DIR"

              FOLDER_ENCODED=$(urlencode "${FOLDER_NAME}")
              SUB_ENCODED=$(urlencode "subtitle.zip")
              SUB_RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_ENCODED}/${SUB_ENCODED}"

              README_FILE="$TARGET_DIR/README.md"
              SUB_SECTION=$(printf '\n## 🔤 Subtitles\n\n| Language | File | Link |\n|----------|------|------|\n| **FA / EN** | `subtitle.zip` | [Download](%s) |\n' "$SUB_RAW_LINK")

              if grep -q "## How to" "$README_FILE" 2>/dev/null; then
                BEFORE=$(sed '/## How to/,$d' "$README_FILE")
                AFTER=$(sed -n '/## How to/,$p' "$README_FILE")
                printf '%s\n%s\n%s\n' "$BEFORE" "$SUB_SECTION" "$AFTER" > "$README_FILE"
              else
                printf '%s\n' "$SUB_SECTION" >> "$README_FILE"
              fi

              echo "Patched README.md with subtitle section"
            else
              echo "No subtitles found for: $ORIG_NAME"
            fi

            rm -rf "$SUB_TMP"
          done < "$VIDEO_INFO_FILE"

      - name: Stop WARP Container
        if: always()
        run: |
          docker stop warp 2>/dev/null || true
          docker rm warp 2>/dev/null || true
          docker network rm warp-net 2>/dev/null || true
          echo "WARP container stopped and removed."

      - name: Incremental Commit & Push
        run: |
          source /tmp/env_vars.txt
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)

          git fetch origin "$BRANCH"
          git reset --hard "origin/$BRANCH"

          mkdir -p videos

          if [ -d "$BACKUP_DIR" ] && [ "$(ls -A $BACKUP_DIR 2>/dev/null)" ]; then
            cp -r "$BACKUP_DIR"/. videos/
            echo "Copied downloaded files to videos/"
          fi

          # Regenerate master README
          MASTER_README="videos/README.md"
          {
            printf '%s\n' "# 📹 Downloaded Videos"
            printf '%s\n' ""
            printf '%s\n' "| # | Video | Folder | Link |"
            printf '%s\n' "|---|-------|--------|------|"
            IDX=0
            for DIR in videos/*/; do
              [ -d "$DIR" ] || continue
              DNAME=$(basename "$DIR")
              [ "$DNAME" = "README.md" ] && continue
              IDX=$((IDX + 1))
              DNAME_ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$DNAME")
              printf '| %s | `%s` | [Open Folder](videos/%s) | [README](videos/%s/README.md) |\n' \
                "$IDX" "$DNAME" "$DNAME_ENCODED" "$DNAME_ENCODED"
            done
            printf '%s\n' ""
            printf '%s\n' "---"
            printf '%s\n' "*Auto-generated by [avasam.ir](https://avasam.ir)*"
          } > "$MASTER_README"

          git add videos/ "$MASTER_README"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            if [ ! -f videos/README.md ]; then
              mkdir -p videos
              printf '# 📹 Downloaded Videos\n\nNo videos yet.\n' > videos/README.md
              git add videos/README.md
              git commit -m "[AVASAM] Initialize videos folder [skip ci]"
              git push origin "$BRANCH"
            fi
            exit 0
          fi

          git commit -m "[AVASAM] YouTube download [skip ci]"

          PUSH_SUCCESS=false
          for ATTEMPT in $(seq 1 10); do
            echo "Push attempt $ATTEMPT/10..."
            if timeout 300 git push origin "$BRANCH"; then
              PUSH_SUCCESS=true
              echo "Push successful!"
              break
            else
              echo "Push failed, fetching latest and retrying..."
              git fetch origin "$BRANCH"
              git reset --hard "origin/$BRANCH"
              cp -r "$BACKUP_DIR"/. videos/ 2>/dev/null || true
              git add videos/ "$MASTER_README"
              git diff --cached --quiet || git commit -m "[AVASAM] YouTube download [skip ci]"
              sleep $((ATTEMPT * 3))
            fi
          done

          if [ "$PUSH_SUCCESS" = false ]; then
            echo "❌ All push attempts failed!"
            exit 1
          fi
